{% extends 'base.html' %}

{% block title %}Delete application | Polito{% endblock %}

{% block content %}
<section class="form-shell mx-auto">
    <div class="panel p-4 p-lg-5 text-center">
        <p class="eyebrow mb-2">Confirm delete</p>
        <h1 class="h3 mb-3">Remove {{ object.role }} at {{ object.company.name }}?</h1>
        <p class="text-muted">This only deletes the tracked application from your career pipeline.</p>
        <form method="post" class="d-flex justify-content-center gap-2">
            {% csrf_token %}
            <a class="btn btn-outline-dark" href="{% url 'career:applications' %}">Cancel</a>
            <button class="btn btn-danger" type="submit">Delete</button>
        </form>
    </div>
</section>
{% endblock %}
