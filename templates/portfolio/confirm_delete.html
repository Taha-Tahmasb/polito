{% extends 'base.html' %}

{% block title %}Delete {{ object.name }} | Polito{% endblock %}

{% block content %}
<section class="form-shell mx-auto">
    <div class="mb-4 text-center">
        <p class="eyebrow mb-2">Danger zone</p>
        <h1 class="mb-2">Delete {{ object.name }}?</h1>
        <p class="text-muted mb-0">This removes the portfolio, its assets, and all of its transaction history.</p>
    </div>
    <div class="panel p-4 p-lg-5">
        <form method="post" class="vstack gap-3">
            {% csrf_token %}
            <p class="mb-0">This action cannot be undone.</p>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Delete portfolio</button>
                <a href="{% url 'portfolio:detail' object.pk %}" class="btn btn-outline-dark">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
