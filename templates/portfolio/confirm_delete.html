{% extends 'base.html' %}

{% block title %}حذف {{ object.name }} | Polito{% endblock %}

{% block content %}
<section class="form-shell mx-auto">
    <div class="mb-4 text-center">
        <p class="eyebrow mb-2">منطقه حساس</p>
        <h1 class="mb-2">پرتفوی {{ object.name }} حذف شود؟</h1>
        <p class="text-muted mb-0">با این کار پرتفوی، دارایی ها و کل تاریخچه تراکنش های آن حذف می شود.</p>
    </div>
    <div class="panel p-4 p-lg-5">
        <form method="post" class="vstack gap-3">
            {% csrf_token %}
            <p class="mb-0">این عملیات قابل بازگشت نیست.</p>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">حذف پرتفوی</button>
                <a href="{% url 'portfolio:detail' object.pk %}" class="btn btn-outline-dark">انصراف</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
