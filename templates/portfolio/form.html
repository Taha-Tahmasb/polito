{% extends 'base.html' %}

{% block content %}
<section class="form-shell mx-auto">
    <div class="mb-4 text-center">
        <p class="eyebrow mb-2">Portfolio workflow</p>
        <h1 class="mb-2">{{ form_title }}</h1>
        <p class="text-muted mb-0">Capture clean data for your authenticated portfolio workspace.</p>
    </div>
    <div class="panel p-4 p-lg-5">
        <form method="post" class="vstack gap-3">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-accent">Save</button>
        </form>
    </div>
</section>
{% endblock %}
